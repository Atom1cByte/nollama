<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOllama - Model Router</title>
    <style>
        :root {
            --primary: #7D56F4;
            --secondary: #B581FD;
            --accent: #F96987;
            --warning: #F98E69;
            --success: #2EDC20;
            --white: #FFFFFF;
            --gray: #B0B0B0;
            --deep-gray: #3A3A3A;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Courier New', monospace;
            background: var(--bg-dark);
            color: var(--white);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .header {
            text-align: center;
            padding: 30px 0;
            border-bottom: 2px solid var(--deep-gray);
            margin-bottom: 20px;
        }
        
        .header h1 {
            color: var(--primary);
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        
        .stat-card {
            background: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            border: 1px solid var(--deep-gray);
        }
        
        .stat-value {
            font-size: 2.5em;
            color: var(--primary);
            font-weight: bold;
        }
        
        .stat-label {
            color: var(--gray);
            margin-top: 5px;
        }
        
        .card {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid var(--deep-gray);
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--deep-gray);
        }
        
        .card-title {
            color: var(--secondary);
            font-size: 1.3em;
        }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9em;
            transition: all 0.3s ease;
            margin: 3px;
        }
        
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        
        .btn-primary:hover {
            background: var(--secondary);
            box-shadow: 0 0 15px var(--primary);
        }
        
        .btn-secondary {
            background: var(--deep-gray);
            color: var(--white);
        }
        
        .input-group {
            margin: 15px 0;
        }
        
        input[type="text"] {
            width: 100%;
            padding: 12px;
            background: var(--bg-dark);
            border: 2px solid var(--deep-gray);
            border-radius: 6px;
            color: var(--white);
            font-family: inherit;
            font-size: 1em;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }
        
        .model-list {
            list-style: none;
        }
        
        .model-item {
            padding: 15px;
            margin: 8px 0;
            background: rgba(125, 86, 244, 0.1);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .model-item:hover {
            background: rgba(125, 86, 244, 0.25);
            transform: translateX(5px);
        }
        
        .model-name {
            color: var(--primary);
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .model-servers {
            color: var(--gray);
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        .server-list {
            margin-top: 10px;
            padding-left: 20px;
        }
        
        .server-item {
            color: var(--secondary);
            font-size: 0.85em;
            margin: 4px 0;
        }
        
        .country-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            margin-left: 10px;
            background: var(--deep-gray);
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: var(--gray);
        }
        
        .hidden { display: none; }
        
        .back-link {
            color: var(--secondary);
            cursor: pointer;
            margin-bottom: 15px;
            display: inline-block;
        }
        
        .back-link:hover { color: var(--primary); }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MODEL ROUTER</h1>
            <p>Distributed Ollama Network - 1000+ Servers</p>
        </div>
        
        <div id="notification-area"></div>
        
        <div class="stats-grid" id="stats-grid">
            <div class="stat-card">
                <div class="stat-value" id="stat-servers">0</div>
                <div class="stat-label">Total Servers</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-with-models">0</div>
                <div class="stat-label">With Models</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-models">0</div>
                <div class="stat-label">Unique Models</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="stat-avg">0</div>
                <div class="stat-label">Avg Servers/Model</div>
            </div>
        </div>
        
        <div class="card">
            <div class="card-header">
                <span class="card-title">ACTIONS</span>
            </div>
            <button class="btn btn-primary" onclick="loadScanData()">Load 1000 Servers</button>
            <button class="btn btn-primary" onclick="refreshLatency()">Check Latency</button>
            <button class="btn btn-secondary" onclick="loadModels()">List Models</button>
        </div>
        
        <div class="card" id="search-card">
            <div class="card-header">
                <span class="card-title">SEARCH MODELS</span>
            </div>
            <div class="input-group">
                <input type="text" id="model-search" placeholder="Search models (e.g., llama, qwen, mistral)..." oninput="searchModels(this.value)">
            </div>
            <ul class="model-list" id="model-list">
                <div class="loading">Click "Load 1000 Servers" to scan network</div>
            </ul>
        </div>
        
        <div class="card hidden" id="detail-card">
            <span class="back-link" onclick="showSearch()">Back to Models</span>
            <div class="card-header">
                <span class="card-title" id="detail-title">Model Details</span>
            </div>
            <div id="detail-content"></div>
            <button class="btn btn-primary" onclick="startChatWithModel()">Chat with this Model</button>
        </div>
        
        <div class="card hidden" id="chat-card">
            <span class="back-link" onclick="showDetail()">Back to Model</span>
            <div class="card-header">
                <span class="card-title" id="chat-title">Chat</span>
            </div>
            <div class="chat-container" style="height: 50vh; display: flex; flex-direction: column;">
                <div class="chat-messages" id="chat-messages" style="flex: 1; overflow-y: auto; padding: 15px; background: var(--bg-dark); border-radius: 8px; margin-bottom: 15px;"></div>
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." style="flex: 1; padding: 15px;" onkeypress="handleChatKeypress(event)">
                    <button class="btn btn-primary" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentModel = null;
        let currentServers = [];
        let chatMessages = [];
        
        async function loadStats() {
            try {
                const response = await fetch('/api/router/status');
                const data = await response.json();
                
                document.getElementById('stat-servers').textContent = data.stats.total_servers;
                document.getElementById('stat-with-models').textContent = data.stats.servers_with_models;
                document.getElementById('stat-models').textContent = data.stats.total_models;
                document.getElementById('stat-avg').textContent = data.stats.avg_servers_per_model;
            } catch (e) {}
        }
        
        async function loadScanData() {
            showNotification('Loading 1000 servers from scan...', 'info');
            
            try {
                const response = await fetch('/api/router/load', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ force: true })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showNotification(`Loaded ${data.stats.servers_with_models} servers with models`, 'success');
                    loadStats();
                    loadModels();
                }
            } catch (e) {
                showNotification('Failed to load scan data', 'error');
            }
        }
        
        async function refreshLatency() {
            showNotification('Checking latencies...', 'info');
            
            try {
                await fetch('/api/router/refresh-latency', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sample_size: 50 })
                });
                
                showNotification('Latency check complete', 'success');
                loadModels();
            } catch (e) {
                showNotification('Failed to check latencies', 'error');
            }
        }
        
        async function loadModels(query = '') {
            const list = document.getElementById('model-list');
            list.innerHTML = '<div class="loading">Loading models...</div>';
            
            try {
                const url = query ? `/api/router/models?q=${encodeURIComponent(query)}` : '/api/router/models';
                const response = await fetch(url);
                const data = await response.json();
                
                if (data.data.length === 0) {
                    list.innerHTML = '<div class="loading">No models found. Click "Load 1000 Servers" first.</div>';
                    return;
                }
                
                list.innerHTML = data.data.map(m => `
                    <li class="model-item" onclick="showModelDetail('${encodeURIComponent(m.id)}')">
                        <span class="model-name">${m.id}</span>
                        <span class="model-servers">
                            Available on <strong>${m.server_count}</strong> servers
                            <span class="country-badge">${getCountries(m.servers)}</span>
                        </span>
                    </li>
                `).join('');
            } catch (e) {
                list.innerHTML = '<div class="loading">Error loading models</div>';
            }
        }
        
        function getCountries(servers) {
            const countries = [...new Set(servers.map(s => s.country))];
            return countries.slice(0, 3).join(', ') + (countries.length > 3 ? '...' : '');
        }
        
        async function searchModels(query) {
            if (query.length < 2) {
                loadModels();
                return;
            }
            loadModels(query);
        }
        
        async function showModelDetail(modelName) {
            modelName = decodeURIComponent(modelName);
            currentModel = modelName;
            
            try {
                const response = await fetch(`/api/router/models/${encodeURIComponent(modelName)}`);
                const data = await response.json();
                
                if (!data.success) {
                    showNotification('Model not found', 'error');
                    return;
                }
                
                currentServers = data.model.servers;
                
                document.getElementById('detail-title').textContent = modelName;
                document.getElementById('detail-content').innerHTML = `
                    <p style="color: var(--gray); margin-bottom: 15px;">
                        Available on <strong>${data.model.server_count}</strong> servers
                    </p>
                    <ul class="server-list">
                        ${data.model.servers.slice(0, 20).map(s => `
                            <li class="server-item">
                                ${s.ip} (${s.city}, ${s.country})
                                ${s.latency ? `<span style="color: var(--success)">${s.latency.toFixed(2)}s</span>` : ''}
                            </li>
                        `).join('')}
                        ${data.model.server_count > 20 ? `<li class="server-item">... and ${data.model.server_count - 20} more</li>` : ''}
                    </ul>
                `;
                
                document.getElementById('search-card').classList.add('hidden');
                document.getElementById('detail-card').classList.remove('hidden');
                document.getElementById('chat-card').classList.add('hidden');
            } catch (e) {
                showNotification('Failed to load model details', 'error');
            }
        }
        
        function showSearch() {
            document.getElementById('search-card').classList.remove('hidden');
            document.getElementById('detail-card').classList.add('hidden');
            document.getElementById('chat-card').classList.add('hidden');
        }
        
        function showDetail() {
            document.getElementById('search-card').classList.add('hidden');
            document.getElementById('detail-card').classList.remove('hidden');
            document.getElementById('chat-card').classList.add('hidden');
        }
        
        function startChatWithModel() {
            document.getElementById('detail-card').classList.add('hidden');
            document.getElementById('chat-card').classList.remove('hidden');
            document.getElementById('chat-title').textContent = `Chat - ${currentModel}`;
            document.getElementById('chat-input').focus();
        }
        
        function handleChatKeypress(event) {
            if (event.key === 'Enter') sendMessage();
        }
        
        async function sendMessage() {
            const input = document.getElementById('chat-input');
            const message = input.value.trim();
            if (!message || !currentModel) return;
            
            input.value = '';
            chatMessages.push({ role: 'user', content: message });
            chatMessages.push({ role: 'assistant', content: '' });
            renderChatMessages();
            
            const assistantMsg = document.querySelector('.message.assistant:last-child .message-content');
            
            try {
                const response = await fetch('/v1/router/chat/completions', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        model: currentModel,
                        messages: chatMessages.slice(0, -1)
                    })
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                const content = data.choices[0].message.content;
                
                chatMessages[chatMessages.length - 1].content = content;
                if (assistantMsg) assistantMsg.textContent = content;
                
            } catch (e) {
                showNotification(`Error: ${e.message}`, 'error');
                chatMessages.pop();
                renderChatMessages();
            }
        }
        
        function renderChatMessages() {
            const container = document.getElementById('chat-messages');
            container.innerHTML = chatMessages.map(msg => `
                <div class="message ${msg.role}" style="margin: 10px 0; padding: 10px; border-radius: 8px; ${msg.role === 'user' ? 'background: rgba(249,105,135,0.2); margin-left: 20%;' : 'background: rgba(125,86,244,0.2); margin-right: 20%;'}">
                    <div style="color: var(--gray); font-size: 0.8em;">${msg.role.toUpperCase()}</div>
                    <div>${msg.content || '...'}</div>
                </div>
            `).join('');
            container.scrollTop = container.scrollHeight;
        }
        
        function showNotification(message, type = 'success') {
            const area = document.getElementById('notification-area');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.style.cssText = 'position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 8px; color: white; z-index: 1000;';
            notification.style.background = type === 'success' ? 'var(--success)' : type === 'error' ? 'var(--accent)' : 'var(--primary)';
            notification.textContent = message;
            area.appendChild(notification);
            setTimeout(() => notification.remove(), 3000);
        }
        
        loadStats();
    </script>
</body>
</html>
